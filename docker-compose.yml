version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: kb_postgres
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_kb
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: kb_api
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    command: npm run start:dev
    ports:
      - "3001:3001"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_kb
      JWT_SECRET: supersecret

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: kb_web
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    command: npm run dev
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001

volumes:
  postgres_data:
